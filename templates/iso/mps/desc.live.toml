[description]
name = "live"
config_version = "0.0.9"
# iso_name = "debian-live-13.4.0-amd64-cinnamon.iso"
# iso_url = "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/debian-live-13.4.0-amd64-cinnamon.iso"
iso_name = "debian-live-13.4.0-amd64-standard.iso"
iso_url = "https://chuangtzu.ftp.acc.umu.se/debian-cd/current-live/amd64/iso-hybrid/debian-live-13.4.0-amd64-standard.iso"
[run]
vmname = "live"
net_devs = [["tap-mpsl1", "brMps", "c2:9c:4a:d7:83:33"]]
net_bridges = [["brMps", "10.10.100.1", "24", true, true]]
net_ports = []
disks = [
  ["disk1.qcow2", "64G", "hdd"],
  ["disk2.qcow2", "64G", "hdd"],
  ["disk3.qcow2", "64G", "hdd"],
  ["disk4.qcow2", "64G", "hdd"],
  # Prevent formatting
]
res_cpu = 8
res_mem = 8192
secure_boot = false
clean_old_vm = false

[addon_postinstall]
joblist_early = []
joblist_late = ["installer/postinstall_mps.bash"]
copy_additional_scripts = ["installer/default/finalize.bash"]
exec_additional_scripts = [
  "installer/default/offline_packages.bash",
  "installer/default/hostnet_dhcp.bash",
  "installer/default/hostnames.bash",
  "installer/default/apt.bash",
  "installer/default/vim.bash",
  "installer/default/locale.bash",
  "installer/default/user.bash",
  "installer/default/essentials.bash",
  "installer/default/shell.bash",
  "installer/default/ssh.bash",
  # "installer/default/docker.bash",
  # "installer/default/firewall.bash",
]
enable_grub_theme = true

[addon_live]
live_enabled = true
live_boot_type = "live"
live_initrd_list = ["live"]
live_copy_umidir = true
live_copy_launchers = ["UMI-install-all.desktop"]
live_squashfs_execute = [
  "/usr/local/bin/install-live-all.bash",
  "/usr/local/bin/install-live-zfs.bash",
]
live_copy_scripts = [
  "installer/live/install-live-all.bash",
  "installer/live/install-live-essentials.bash",
  "installer/live/install-live-user.bash",
  "installer/live/install-live-zfs.bash",
  "installer/live/debootstrap-zfs.bash",
  "installer/live/debootstrap-debian.bash",
]

zfs_name = "debianzfs"
zfs_bpool = [
  "bpool",
  "mirror",
  "/dev/disk/by-id/virtio-DISK-0 /dev/disk/by-id/virtio-DISK-1",
]
zfs_rpool = [
  "rpool",
  "mirror",
  "/dev/disk/by-id/virtio-DISK-0 /dev/disk/by-id/virtio-DISK-1",
]
zfs_opool = [
  "opool",
  "mirror",
  "/dev/disk/by-id/virtio-DISK-2 /dev/disk/by-id/virtio-DISK-3",
]
zfs_datasets = [
  ["root", "/", "rpool/ROOT/root-debian"],
  ["boot", "/boot", "bpool/BOOT/boot-debian"],
  ["home", "/home", "rpool/ROOT/home-debian"],
  ["data", "/data", "opool/OPTS/data-debian"],
  # Prevent formatting
]
zfs_props_pool = ["ashift=12", "autotrim=on"]
zfs_props_zfs = [
  "acltype=posixacl",
  "xattr=sa",
  "relatime=on",
  "normalization=formD",
  "mountpoint=none",
]

[addon_user]
user_enabled = true
default_user_dir = "umi"

[addon_grub]
grub_enabled = true
grub_boot_type = "live"
grub_theme = "showroom"
timeout = 30
sleeptime = 10
initrd_list = ["install"]

[addon_answerfile]
answerfile_enable_networking = false
answerfile_enable_dhcp = false
answerfile_enable_crypto = false
answerfile_enable_lvm = true
answerfile_confirm_partitioning = true
answerfile_confirm_final_reboot = false
install_disk = ""
user_root_pw = "rootpass"
user_other_name = "jb"
user_other_fullname = "jb"
user_other_pw = "jbpass"
disk_recipe = "simple"
host_name = "hivevm"
host_domain = "local"
net_dhcp = false
net_ip = ""
net_mask = ""
net_gateway = ""
net_dns = "8.8.8.8"
packages_install = ["openssh-server", "sudo"]
additional_users = ["deploy"]
sudo_users = ["deploy", "jb"]
admin_users = ["jb"]
config_users = ["jb"]
deployment_users = ["deploy"]
admin_group_name = "umi-admin"
config_group_name = "umi-config"
disk_password = "diskpass"
include_git_repositories = [
] #["https://github.com/mpsffap/ansible-fragments.git"]
include_offline_packages = [
  "vlan",
  "ifenslave",
  "isc-dhcp-client",
  "vim",
  "vim-runtime",
  "net-tools",
]
include_anna_packages = [
  "fdisk-udeb",
  "parted-udeb",
  "wget-udeb",
  "ssh-client-udeb",
]
preseed_commands_early = []
preseed_commands_late = []
ssh_installation_enabled = false
ssh_installation_breakpoint_pre = "" # Can be networking, partman, packages or grub
ssh_installation_breakpoint_post = "" # Can be networking, partman, packages or grub
# ssh_installation_password = "foobar"

[addon_cmd]
cmd_enabled = true
cmds = [
  { "name" = "cmd1", "scope" = "", "con" = "nat", "cmd" = "echo hello" },
  { "name" = "bash", "scope" = "", "con" = "nat", "cmd" = "bash -i" },
]

[addon_ssh]
ssh_enabled = true
config_auth_append = "~/.ssh/id_rsa.pub"


[[env]]
"DEFAULT_HOST" = "hive"
"DEFAULT_DOMAIN" = "local"
"DEFAULT_NIC_0" = "enp0s5"
# "DEFAULT_NIC_0" = "enp6s0"
# "DEFAULT_NIC_1" = "enp7s0"
"DOCKER_ROOT" = "/srv/docker"
# "DEFAULT_FW_POLICY_IN" = "DROP"
# "DEFAULT_FW_POLICY_OUT" = "ACCEPT"
# "DEFAULT_FW_POLICY_FWD" = "DROP"
# "DEFAULT_FW_PORTS_TCP" = "22"
# "DEFAULT_FW_PORTS_UDP" = ""
